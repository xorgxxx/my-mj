<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كم تحب الأناناس؟ 🍍</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- شاشة السؤال -->
  <section id="screen-question" class="screen active">
    <div class="pine-decor pine-decor--left">🍍</div>
    <div class="pine-decor pine-decor--right">🍍</div>

    <h1 class="title">كم تحب الأناناس؟ <span class="emoji">🍍</span></h1>

    <div class="slider-card" id="sliderCard">
      <div class="slider-wrap" id="sliderWrap">
        <div class="slider-fill" id="sliderFill"></div>
        <input type="range" id="slider" min="0" max="100" value="0" step="1" aria-label="مقياس حب الأناناس">
        <div class="crack-line" id="crackLine"></div>
      </div>
      <div class="percent-label" id="percentLabel">٠٪</div>
    </div>

    <p class="hint">كلما زادت سرعة السحب، دلّ ذلك على أنك تحب الأناناس أكثر.</p>

    <div class="btn-row hidden" id="btnRow">
      <button id="sureBtn" class="confirm-btn">متأكد</button>
      <button id="retryBtnEarly" class="retry-btn retry-btn--ghost">إعادة المحاولة</button>
    </div>
  </section>

  <!-- شاشة الانتقال -->
  <section id="screen-transition" class="screen transition-screen">
    <div class="burst"></div>
    <div class="burst burst--2"></div>
  </section>

  <!-- مشهد نمو الوردة -->
  <section id="screen-scene" class="screen scene">
    <div class="vignette"></div>
    <div class="ambient-glow" id="ambientGlow"></div>
    <div class="ground"></div>
    <div class="ground-glow" id="groundGlow"></div>

    <div class="plant" id="plant">
      <div class="stem-glow" id="stemGlow"></div>
      <div class="stem">
        <div class="thorn thorn--1"></div>
        <div class="thorn thorn--2"></div>
        <div class="thorn thorn--3"></div>
      </div>

      <div class="leaf leaf--l1"><span class="leaf-vein"></span></div>
      <div class="leaf leaf--r1"><span class="leaf-vein"></span></div>
      <div class="leaf leaf--l2"><span class="leaf-vein"></span></div>
      <div class="leaf leaf--r2"><span class="leaf-vein"></span></div>

      <div class="rose-glow" id="roseGlow"></div>
      <div class="rose">
        <div class="sepal sepal--1"></div>
        <div class="sepal sepal--2"></div>
        <div class="sepal sepal--3"></div>

        <div class="petal petal-outer petal--1"></div>
        <div class="petal petal-outer petal--2"></div>
        <div class="petal petal-outer petal--3"></div>
        <div class="petal petal-outer petal--4"></div>
        <div class="petal petal-outer petal--5"></div>
        <div class="petal petal-outer petal--6"></div>

        <div class="petal petal-mid petal--1"></div>
        <div class="petal petal-mid petal--2"></div>
        <div class="petal petal-mid petal--3"></div>
        <div class="petal petal-mid petal--4"></div>
        <div class="petal petal-mid petal--5"></div>

        <div class="petal petal-inner petal--1"></div>
        <div class="petal petal-inner petal--2"></div>
        <div class="petal petal-inner petal--3"></div>
        <div class="petal petal-inner petal--4"></div>

        <div class="bud-center"></div>
      </div>
    </div>

    <p class="final-message" id="finalMessage">Til death do us part</p>
  </section>

  <!-- رسالة خيبة الأمل -->
  <div id="failOverlay" class="overlay hidden">
    <p class="fail-message">شكراً لك لمحاولتك مع الأناناس. <span class="emoji">🍍❤️</span></p>
  </div>

  <audio id="flowerAudio" src="flower.mp3" preload="auto"></audio>
  <audio id="sadAudio" src="sad.mp3" preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
