<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كم تحب الأناناس؟ 🍍</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- التنويه -->
  <div id="noticeOverlay" class="notice-overlay">
    <div class="notice-card">
      <h2 class="notice-title">تنويه</h2>
      <p class="notice-text">كلما زادت سرعة سحب المؤشر، دلّ ذلك على أن محبتك للأناناس أكبر.</p>
      <button id="noticeOkBtn" class="notice-btn">موافق</button>
    </div>
  </div>

  <!-- شاشة السؤال -->
  <section id="screen-question" class="screen active">
    <div class="q-ambient-glow"></div>
    <div class="fruit-blur fruit-blur--1"></div>
    <div class="fruit-blur fruit-blur--2"></div>
    <div class="fruit-blur fruit-blur--3"></div>
    <div class="pine-decor pine-decor--left">🍍</div>
    <div class="pine-decor pine-decor--right">🍍</div>

    <h1 class="title">كم تحب الأناناس؟ <span class="emoji">🍍</span></h1>

    <div class="slider-card" id="sliderCard">
      <div class="slider-wrap" id="sliderWrap">
        <div class="slider-fill" id="sliderFill"></div>
        <div class="slider-glow" id="sliderGlow"></div>
        <input type="range" id="slider" min="0" max="100" value="0" step="1" aria-label="مقياس حب الأناناس">
        <div class="thumb-halo" id="thumbHalo"></div>
        <div class="crack-line" id="crackLine"></div>
      </div>
      <div class="percent-label" id="percentLabel">٠٪</div>
    </div>

    <p class="hint">كلما زادت سرعة السحب، دلّ ذلك على أنك تحب الأناناس أكثر.</p>

    <div class="btn-row hidden" id="btnRow">
      <button id="sureBtn" class="confirm-btn">متأكد</button>
      <button id="retryBtnEarly" class="retry-btn retry-btn--ghost">إعادة المحاولة</button>
    </div>
  </section>

  <!-- شاشة الانتقال -->
  <section id="screen-transition" class="screen transition-screen">
    <div class="burst"></div>
    <div class="burst burst--2"></div>
  </section>

  <!-- مشهد نمو الوردة -->
  <section id="screen-scene" class="screen scene">
    <div class="vignette"></div>
    <div class="ambient-glow" id="ambientGlow"></div>
    <div class="ground"></div>
    <div class="ground-glow" id="groundGlow"></div>

    <div class="plant" id="plant">
      <div class="stem-glow" id="stemGlow"></div>
      <div class="stem">
        <div class="thorn thorn--1"></div>
        <div class="thorn thorn--2"></div>
        <div class="thorn thorn--3"></div>
      </div>

      <div class="leaf leaf--l1"><span class="leaf-vein"></span></div>
      <div class="leaf leaf--r1"><span class="leaf-vein"></span></div>
      <div class="leaf leaf--l2"><span class="leaf-vein"></span></div>
      <div class="leaf leaf--r2"><span class="leaf-vein"></span></div>

      <div class="rose">
        <svg class="rose-svg" viewBox="0 0 200 200" aria-hidden="true">
          <defs>
            <radialGradient id="coreGlowGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ff4a57" stop-opacity="0.95"/>
              <stop offset="55%" stop-color="#ff2d43" stop-opacity="0.4"/>
              <stop offset="100%" stop-color="#ff2d43" stop-opacity="0"/>
            </radialGradient>
            <filter id="glowBlur" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="16"/>
            </filter>
            <filter id="petalShadow" x="-50%" y="-50%" width="200%" height="200%">
              <feDropShadow dx="0" dy="2.4" stdDeviation="2.1" flood-color="#3a0509" flood-opacity="0.4"/>
            </filter>
            <radialGradient id="gradSepal" cx="38%" cy="18%" r="85%">
              <stop offset="0%" stop-color="#5fbf6a"/>
              <stop offset="100%" stop-color="#1f4f24"/>
            </radialGradient>
            <radialGradient id="gradOuter" cx="35%" cy="20%" r="82%">
              <stop offset="0%" stop-color="#ff6b78"/>
              <stop offset="55%" stop-color="#e63950"/>
              <stop offset="100%" stop-color="#5e0c15"/>
            </radialGradient>
            <radialGradient id="gradMid" cx="37%" cy="20%" r="80%">
              <stop offset="0%" stop-color="#ff8f92"/>
              <stop offset="55%" stop-color="#f13a52"/>
              <stop offset="100%" stop-color="#831422"/>
            </radialGradient>
            <radialGradient id="gradInner" cx="40%" cy="22%" r="78%">
              <stop offset="0%" stop-color="#ffb9b2"/>
              <stop offset="55%" stop-color="#ff5b62"/>
              <stop offset="100%" stop-color="#9c1727"/>
            </radialGradient>
            <radialGradient id="gradBud" cx="42%" cy="24%" r="76%">
              <stop offset="0%" stop-color="#ffd8cd"/>
              <stop offset="55%" stop-color="#ff7263"/>
              <stop offset="100%" stop-color="#ad1e20"/>
            </radialGradient>
          </defs>

          <circle class="rose-core-glow" cx="100" cy="100" r="80" fill="url(#coreGlowGrad)" filter="url(#glowBlur)"/>

          <g class="ring ring-sepal" filter="url(#petalShadow)">
            <path d="M0,0 C-10,-4 -16,-15 -14,-25 C-13,-32 -7,-37 0,-39 C7,-37 13,-32 14,-25 C16,-15 10,-4 0,0 Z" transform="translate(100,100) rotate(-90) scale(1.35)" fill="url(#gradSepal)"/>
            <path d="M0,0 C-10,-4 -16,-15 -14,-25 C-13,-32 -7,-37 0,-39 C7,-37 13,-32 14,-25 C16,-15 10,-4 0,0 Z" transform="translate(100,100) rotate(150) scale(1.35)" fill="url(#gradSepal)"/>
            <path d="M0,0 C-10,-4 -16,-15 -14,-25 C-13,-32 -7,-37 0,-39 C7,-37 13,-32 14,-25 C16,-15 10,-4 0,0 Z" transform="translate(100,100) rotate(30) scale(1.35)" fill="url(#gradSepal)"/>
          </g>

          <g class="ring ring-outer" filter="url(#petalShadow)">
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(-38)" fill="url(#gradOuter)"/>
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(22)" fill="url(#gradOuter)"/>
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(82)" fill="url(#gradOuter)"/>
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(142)" fill="url(#gradOuter)"/>
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(202)" fill="url(#gradOuter)"/>
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(262)" fill="url(#gradOuter)"/>
          </g>

          <g class="ring ring-mid" filter="url(#petalShadow)">
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(0) scale(0.72)" fill="url(#gradMid)"/>
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(72) scale(0.72)" fill="url(#gradMid)"/>
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(144) scale(0.72)" fill="url(#gradMid)"/>
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(216) scale(0.72)" fill="url(#gradMid)"/>
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(288) scale(0.72)" fill="url(#gradMid)"/>
          </g>

          <g class="ring ring-inner" filter="url(#petalShadow)">
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(15) scale(0.46)" fill="url(#gradInner)"/>
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(105) scale(0.46)" fill="url(#gradInner)"/>
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(195) scale(0.46)" fill="url(#gradInner)"/>
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(285) scale(0.46)" fill="url(#gradInner)"/>
          </g>

          <g class="ring ring-bud" filter="url(#petalShadow)">
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(40) scale(0.24)" fill="url(#gradBud)"/>
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(160) scale(0.24)" fill="url(#gradBud)"/>
            <path class="petal-path" d="M0,0 C-24,-8 -36,-28 -33,-46 C-31,-60 -20,-69 -9,-72 C-6,-73 -4,-70 0,-62 C4,-70 6,-73 9,-72 C20,-69 31,-60 33,-46 C36,-28 24,-8 0,0 Z" transform="translate(100,100) rotate(280) scale(0.24)" fill="url(#gradBud)"/>
            <circle cx="100" cy="100" r="7" fill="url(#gradBud)"/>
          </g>
        </svg>
      </div>
    </div>

    <p class="final-message" id="finalMessage">Til death do us part</p>
    <div class="falling-petal falling-petal--1"></div>
    <div class="falling-petal falling-petal--2"></div>
    <div class="falling-petal falling-petal--3"></div>
    <div class="scene-fade" id="sceneFade"></div>
  </section>

  <!-- مشهد الرفض / الكيان الغامض -->
  <section id="screen-fail" class="screen fail-scene">
    <div class="fail-light-drain" id="failLightDrain"></div>
    <p class="fail-message" id="failMessage">لقد اعتقدت أنك تكن للأناناس أكثر من هذا.</p>

    <div class="fail-void">
      <div class="fail-dust fail-dust--1"></div>
      <div class="fail-dust fail-dust--2"></div>
      <div class="fail-dust fail-dust--3"></div>
      <div class="fail-dust fail-dust--4"></div>
      <div class="fail-fog"></div>

      <div class="fail-heart" id="failHeart">
        <svg viewBox="0 0 100 90" class="fail-heart-svg" aria-hidden="true">
          <defs>
            <linearGradient id="heartGradL" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ff5c6c"/>
              <stop offset="100%" stop-color="#6b0d16"/>
            </linearGradient>
            <linearGradient id="heartGradR" x1="1" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ff5c6c"/>
              <stop offset="100%" stop-color="#6b0d16"/>
            </linearGradient>
          </defs>
          <path class="fail-heart-half fail-heart-left"
            d="M50,88 C20,65 0,45 0,25 C0,10 12,0 25,0 C35,0 45,6 50,18 Z"
            fill="url(#heartGradL)"/>
          <path class="fail-heart-half fail-heart-right"
            d="M50,88 C80,65 100,45 100,25 C100,10 88,0 75,0 C65,0 55,6 50,18 Z"
            fill="url(#heartGradR)"/>
          <path class="fail-heart-crack" pathLength="100"
            d="M50,18 L45,30 L55,40 L43,52 L57,64 L46,76 L50,88"
            fill="none" stroke="#fff3ea" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="fail-entity" id="failEntity">
        <div class="fail-entity-core"></div>
        <div class="fail-entity-wisp fail-entity-wisp--1"></div>
        <div class="fail-entity-wisp fail-entity-wisp--2"></div>
        <div class="fail-entity-wisp fail-entity-wisp--3"></div>
      </div>
      <div class="fail-blackout" id="failBlackout"></div>
    </div>
  </section>

  <audio id="flowerAudio" src="flower.mp3" preload="auto"></audio>
  <audio id="sadAudio" src="sad.mp3" preload="auto"></audio>

  <script src="script.js"></script>
</body>
  </html>
